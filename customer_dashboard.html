<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard // Park.AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --surface-hover: #141414;
            --border: #333333;
            --text: #ffffff;
            --text-dim: #888888;
            --accent: #ccff00;
            --danger: #ff3333;
            --font-disp: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Nav */
        nav {
            padding: 24px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-logo { font-family: var(--font-code); font-weight: 700; color: var(--accent); letter-spacing: 2px; }
        .nav-user { font-family: var(--font-disp); font-size: 14px; text-transform: uppercase; color: var(--text-dim); }

        /* Main */
        main {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }
        
        .header-wrap { margin-bottom: 40px; }
        h1 { font-family: var(--font-disp); font-size: 40px; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 8px; }
        .location-tag { display: inline-block; padding: 6px 12px; border: 1px solid var(--border); font-family: var(--font-code); font-size: 12px; color: var(--accent); }

        /* Lots Grid */
        .lots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .lot-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 24px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .lot-card::before {
            content: ''; position: absolute; left: 0; top: 0;
            width: 4px; height: 0%; background: var(--accent);
            transition: height 0.3s;
        }
        .lot-card:hover { background: var(--surface-hover); border-color: #555; }
        .lot-card:hover::before { height: 100%; }

        .lot-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .lot-name { font-family: var(--font-disp); font-weight: 700; font-size: 20px; text-transform: uppercase; }
        .lot-dist { font-family: var(--font-code); font-size: 12px; color: var(--text-dim); background: var(--bg); padding: 4px 8px; border: 1px solid var(--border); }

        .lot-stats {
            display: flex; gap: 24px; margin-bottom: 24px;
            font-family: var(--font-code); font-size: 13px;
        }
        .stat span { display: block; font-size: 20px; color: var(--accent); font-weight: 700; margin-top: 4px;}
        .stat label { color: var(--text-dim); font-size:10px; text-transform:uppercase; display:block; }
        
        .stat.full span { color: var(--danger); }

        .btn-select {
            width: 100%; padding: 16px;
            background: transparent; color: var(--text); border: 1px solid var(--border);
            font-family: var(--font-disp); font-weight: 700; text-transform: uppercase;
            cursor: pointer; transition: all 0.2s;
        }
        .lot-card:hover .btn-select { background: var(--text); color: var(--bg); }

        /* Booking Overlay */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .booking-panel {
            background: var(--surface); border: 1px solid var(--border);
            width: 100%; max-width: 500px; padding: 40px;
            transform: translateY(50px); opacity: 0;
        }

        .bp-title { font-family:var(--font-disp); font-size: 28px; text-transform: uppercase; margin-bottom: 8px;}
        .bp-sub { font-family:var(--font-code); font-size: 13px; color:var(--accent); margin-bottom: 32px;}

        .input-group { position: relative; margin-bottom: 24px; }
        .input-group input { 
            width: 100%; padding: 24px 20px 12px; background: var(--bg); border: 1px solid var(--border);
            color: var(--text); font-family: var(--font-code); font-size: 16px; outline: none;
        }
        .input-group input:focus { border-color: var(--accent); }
        .input-group label {
            position: absolute; top: 18px; left: 20px; color: var(--text-dim);
            font-family: var(--font-disp); font-size: 12px; text-transform: uppercase; pointer-events:none;
            transition: 0.2s;
        }
        .input-group input:focus ~ label, .input-group input:not(:placeholder-shown) ~ label {
            top: 6px; left: 10px; font-size: 9px; color: var(--accent);
        }

        .summary-box {
            background: var(--bg); border: 1px dashed var(--border); padding: 16px; margin-bottom: 24px;
            font-family: var(--font-code); font-size: 14px; display:flex; justify-content: space-between;
        }
        .summary-box .val { color: var(--accent); font-weight: bold; }

        .btn-book {
            width: 100%; padding: 20px; background: var(--accent); color: var(--bg); border: none;
            font-family: var(--font-disp); font-weight: 800; font-size: 18px; text-transform: uppercase;
            cursor: pointer; transition: 0.2s;
        }
        .btn-book:hover { filter: brightness(1.1); transform: translateY(-2px); }

        .btn-close {
            position: absolute; top: 20px; right: 20px; background:transparent; border:none;
            color: var(--text-dim); font-size: 24px; cursor: pointer; transition: 0.2s;
        }
        .btn-close:hover { color: var(--text); }

        /* Toast */
        .toast {
            position: fixed; bottom: -80px; left: 50%; transform: translateX(-50%);
            background: var(--text); color: var(--bg); padding: 16px 32px;
            font-family: var(--font-disp); font-weight: 700; text-transform: uppercase;
            border: none; display: flex; align-items: center; gap: 12px; z-index: 200;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">PARK.AI // CUST</div>
        <div class="nav-user">
            <span id="nav-id">USER_1049</span> | <a href="parking_auth.html" style="color:var(--danger); text-decoration:none;">DISCONNECT</a>
        </div>
    </nav>

    <main>
        <div class="header-wrap">
            <h1>Nearby Terminals</h1>
            <div class="location-tag" id="loc-badge">LOC: DETECTING...</div>
        </div>

        <div class="lots-grid" id="lots-container">
            <!-- Rendered by JS -->
        </div>
    </main>

    <!-- Booking Modal -->
    <div class="overlay" id="booking-overlay">
        <div class="booking-panel" id="booking-panel">
            <button class="btn-close" onclick="closeBooking()">&times;</button>
            <div class="bp-title" id="bp-name">LOT_NAME</div>
            <div class="bp-sub" id="bp-rate">RATE</div>

            <div class="input-group">
                <input type="text" id="veh-plate" placeholder=" ">
                <label>Vehicle Plate (e.g. MH12AB1234)</label>
            </div>
            <div class="input-group">
                <input type="number" id="book-hours" placeholder=" " min="1" max="24" value="1" oninput="updateTotal()">
                <label>Duration (Hours)</label>
            </div>

            <div class="summary-box">
                <span>Total Protocol Cost:</span>
                <span class="val" id="bp-total">$0.00</span>
            </div>

            <button class="btn-book" onclick="confirmBooking()">Execute Booking</button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        ⚡ ALLOTMENT SECURED. PROCEED TO TERMINAL.
    </div>

    <script>
        let activeLot = null;
        let fetchInterval = null;

        window.onload = () => {
            const userId = sessionStorage.getItem('activeIdentity');
            if(userId) document.getElementById('nav-id').innerText = userId.toUpperCase();
            
            document.getElementById('loc-badge').innerText = "FETCHING SQL DATABASE...";
            fetchLots();
            fetchInterval = setInterval(fetchLots, 2000); // sync db
        };

        async function fetchLots() {
            try {
                const res = await fetch('http://localhost:3000/api/parking');
                const data = await res.json();
                renderLots(data.lots || []);
            } catch (e) { console.warn("FETCH ERR"); }
        }

        function renderLots(lots) {
            const container = document.getElementById('lots-container');
            container.innerHTML = '';

            if (lots.length === 0) {
                container.innerHTML = '<div style="color:var(--danger); text-align:center; width:100%; grid-column:1/-1; margin-top: 40px; font-family: var(--font-disp);">No parking slots available yet. Wait for owner to add to DB.</div>';
                return;
            }

            lots.forEach((lot, i) => {
                const isFull = lot.available_slots <= 0;
                
                const card = document.createElement('div');
                card.className = 'lot-card';
                card.innerHTML = `
                    <div class="lot-header">
                        <div class="lot-name">${lot.name}</div>
                        <div class="lot-dist">${lot.location}</div>
                    </div>
                    <div class="lot-stats">
                        <div class="stat ${isFull ? 'full' : ''}">
                            <label>Status</label>
                            <span>${isFull ? 'FULL' : lot.available_slots + ' SPOTS'}</span>
                        </div>
                        <div class="stat">
                            <label>Rate</label>
                            <span>$${(lot.rate || 0).toFixed(2)}/hr</span>
                        </div>
                    </div>
                    <button class="btn-select" ${isFull ? 'disabled style="opacity:0.3; cursor:not-allowed;"' : ''} 
                            onclick="openBooking('${lot.id}', '${lot.name}', ${lot.rate})">
                        ${isFull ? 'LOCKED' : 'SELECT TERMINAL'}
                    </button>
                `;
                container.appendChild(card);
            });
        }

        function openBooking(lotId, lotName, rate) {
            activeLot = { id: lotId, rate: rate };
            document.getElementById('bp-name').innerText = lotName;
            document.getElementById('bp-rate').innerText = `$${(rate || 0).toFixed(2)} / HR RATE`;
            document.getElementById('book-hours').value = 1;
            document.getElementById('veh-plate').value = "";
            updateTotal();

            const overlay = document.getElementById('booking-overlay');
            const panel = document.getElementById('booking-panel');
            overlay.style.display = 'flex';
            gsap.fromTo(panel, { y: 50, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4, ease: 'back.out(1)' });
        }

        function closeBooking() {
            const overlay = document.getElementById('booking-overlay');
            const panel = document.getElementById('booking-panel');
            gsap.to(panel, { y: 20, opacity: 0, duration: 0.3, onComplete: () => { overlay.style.display = 'none'; }});
        }

        function updateTotal() {
            if(!activeLot) return;
            const hrs = parseInt(document.getElementById('book-hours').value) || 0;
            const total = hrs * (activeLot.rate || 0);
            document.getElementById('bp-total').innerText = `$${total.toFixed(2)}`;
        }

        async function confirmBooking() {
            const plate = document.getElementById('veh-plate').value.trim();
            if(!plate) { alert("VEHICLE PLATE REQUIRED"); return; }

            const btn = document.querySelector('.btn-book');
            btn.innerText = "UPDATING DATABASE...";
            btn.style.background = "var(--text)";
            btn.style.color = "var(--bg)";

            try {
                const res = await fetch('http://localhost:3000/api/bookings', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: sessionStorage.getItem('activeIdentity') || 'CUST',
                        parking_id: activeLot.id, time_duration: parseInt(document.getElementById('book-hours').value),
                        plate: plate, type: 'Car'
                    })
                });
                
                const data = await res.json();
                if (!res.ok) { alert(data.error); closeBooking(); return; }
                
                closeBooking();
                btn.innerText = "Execute Booking";
                btn.style.background = "var(--accent)";
                btn.style.color = "var(--bg)";
                
                fetchLots();
                showToast();
            } catch(e) { alert("DATABASE REJECTED BOOKING"); }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            gsap.to(toast, { bottom: 40, duration: 0.5, ease: 'back.out(2)' });
            setTimeout(() => { gsap.to(toast, { bottom: -80, duration: 0.5, ease: 'power3.in' }); }, 3000);
        }
    </script>
</body>
</html>
